# Toy config for LMCache disaggregated prefill (consumer)
# Keep a small LocalCPU backend enabled to satisfy allocator backend requirements.
local_cpu: True
max_local_cpu_size: 1073741824  # 1 GiB
max_local_disk_size: 0
remote_serde: NULL

enable_nixl: True
nixl_role: "receiver"
nixl_peer_host: "localhost"
nixl_peer_port: 55555
nixl_buffer_size: 1073741824  # 1 GiB
nixl_buffer_device: "cuda"
nixl_enable_gc: True
